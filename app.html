<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parcell - Application</title>
<meta name="robots" content="noindex,follow">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="css/site.css">
<link rel="stylesheet" href="css/main.css">
<style>
  body{background:var(--bg);}
  .page-header{padding:28px 0 18px;border-bottom:1px solid var(--border);margin-bottom:22px;}
  .page-header h1{font-family:'Outfit',sans-serif;font-size:clamp(22px,3.2vw,30px);font-weight:800;letter-spacing:-0.02em;margin:8px 0 6px;}
  .page-header .ph-desc{color:var(--text2);font-size:14px;max-width:780px;}
  .nav-links a.active{color:var(--text);}
  .nav-links a.active::after{content:'';display:block;height:2px;margin-top:4px;background:linear-gradient(90deg,var(--gold),var(--teal));border-radius:2px;}
  #appRoot .hero{padding:0;border:0;background:none;}
  .nav-cta .nav-user{margin-left:6px;}
  .site-footer{margin-top:48px;padding:32px 0 20px;}
  .site-footer .footer-bottom{border-top:none;padding-top:0;}
</style>
</head>
<body>
<div class="scroll-progress" id="scrollProgress"></div>
<div class="ambient ambient-1" id="amb1"></div>
<div class="ambient ambient-2" id="amb2"></div>
<div id="authWall" style="display:none;"></div>
<div id="appRoot" style="display:none;">
  <header class="site-nav">
    <div class="site-nav-inner">
      <a class="brand" href="/" aria-label="Parcell accueil"><span class="brand-mark"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span class="brand-name">Parc<span>ell</span></span></a>
      <nav class="nav-links" id="navLinks">
        <a href="/">Accueil</a>
        <a href="#simulateur" class="app-nav" data-tab="simulateur">Simulateur</a>
        <a href="#analyse" class="app-nav" data-tab="analyse">Analyse des villes</a>
        <a href="#compte" class="app-nav" data-tab="compte">Mes projets</a>
        <a href="/#guides">Guides</a>
      </nav>
      <div class="nav-cta">
        <div class="nav-user">
          <span class="nav-user-name" id="navUserName" onclick="toggleUserDropdown()"></span>
          <div class="nav-avatar" id="navAvatar" onclick="toggleUserDropdown()"></div>
          <div class="user-dropdown" id="userDropdown">
            <div class="ud-header"><div class="ud-name" id="ddName"></div><div class="ud-email" id="ddEmail"></div><span class="ud-plan">Plan Gratuit</span></div>
            <div class="ud-item" onclick="switchTab('compte',null);closeUserDropdown();updateActiveNav('compte')">Mon profil</div>
            <div class="ud-item" onclick="switchTab('compte',null);showCompteSection('projets');closeUserDropdown();updateActiveNav('compte')">Mes projets</div>
            <div class="ud-item" onclick="switchTab('compte',null);showCompteSection('notifs');closeUserDropdown();updateActiveNav('compte')">Notifications<span id="navNotifBadge" style="display:none;margin-left:auto;background:var(--teal);color:#0a0d14;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;"></span></div>
            <div class="ud-divider"></div>
            <div class="ud-item ud-logout" onclick="signOut()">Se deconnecter</div>
          </div>
        </div>
        <button class="nav-burger" id="navBurger" aria-label="Ouvrir le menu" aria-expanded="false"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      </div>
    </div>
  </header>
  <main class="wrap">
    <div class="page-header" id="pageHeader">
      <span class="eyebrow"><span class="dot"></span> <span id="phEyebrow">Outil</span></span>
      <h1 id="phTitle">Analyse des villes</h1>
      <p class="ph-desc" id="phDesc">Comparez 775 villes françaises.</p>
    </div>
    <div id="tabContainer"></div>
  </main>
  <div class="detail-overlay" id="detailOverlay" onclick="closeDrawer()"></div>
  <div class="detail-drawer" id="detailDrawer"><div class="drawer-close" onclick="closeDrawer()">X</div><div class="drawer-title" id="drawerTitle"></div><div class="drawer-subtitle" id="drawerSubtitle"></div><div id="drawerContent"></div></div>
  <div class="modal-overlay" id="saveModal" onclick="closeSaveModal(event)">
    <div class="modal-box">
      <div class="modal-title">Sauvegarder le projet</div>
      <div class="modal-field"><label>Nom du projet</label><input type="text" id="saveProjectName"></div>
      <div class="modal-field"><label>Note</label><textarea id="saveProjectNote" rows="2"></textarea></div>
      <div class="modal-actions"><button class="modal-btn-cancel" onclick="closeSaveModal()">Annuler</button><button class="modal-btn-save" onclick="saveProject()">Sauvegarder</button></div>
    </div>
  </div>
  <div class="save-toast" id="saveToast"><span id="toastMsg">OK</span></div>
  <footer class="site-footer"><div class="wrap"><div class="footer-bottom"><span>2026 Parcell <a href="/">Accueil</a></span></div></div></footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="js/config.js?v=3"></script>
<script src="js/cities_loader.js?v=7"></script>
<script src="js/auth.js?v=3"></script>
<script src="js/simulator.js?v=7"></script>
<script src="js/projects.js?v=4"></script>
<script src="js/app.js?v=4"></script>
<script>
(function(){
  var PH={simulateur:{eyebrow:'Outil',title:'Simulateur',desc:'Calculez le rendement.'},analyse:{eyebrow:'Outil',title:'Analyse',desc:'Comparez 775 villes.'},compte:{eyebrow:'Espace',title:'Mes projets',desc:'Vos simulations.'}};
  window.updateActiveNav=function(t){document.querySelectorAll('.app-nav').forEach(function(a){a.classList.toggle('active',a.dataset.tab===t);});var p=PH[t];if(!p)return;var e=document.getElementById('phEyebrow'),h=document.getElementById('phTitle'),d=document.getElementById('phDesc');if(e)e.textContent=p.eyebrow;if(h)h.textContent=p.title;if(d)d.textContent=p.desc;};
  function fromHash(){var t=(location.hash||'').replace('#','');return['simulateur','analyse','compte'].indexOf(t)>=0?t:'analyse';}
  function go(t){if(typeof switchTab==='function')switchTab(t,null);updateActiveNav(t);}
  window.addEventListener('hashchange',function(){go(fromHash());});
  window.addEventListener('load',function(){setTimeout(function(){var o=window.switchTab;if(typeof o==='function'){window.switchTab=function(t,e){o(t,e);updateActiveNav(t);};}go(fromHash());},150);});
  var b=document.getElementById('navBurger'),l=document.getElementById('navLinks');
  if(b&&l)b.addEventListener('click',function(){var o=l.classList.toggle('open');b.setAttribute('aria-expanded',o?'true':'false');});
})();
</script>
</body>
</html>
