# netlify.toml — Configuration Netlify (site multi-pages)

[build]
  publish = "."
  command = ""

# Page d'erreur personnalisee si besoin (sinon 404 standard)
# [[redirects]]
#   from = "/*"
#   to = "/404.html"
#   status = 404

# Headers de securite
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
